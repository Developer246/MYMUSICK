<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="MYMUSICK - Busca y escucha tu música favorita sin interrupciones.">

  <title>MYMUSICK</title>

  <link rel="icon" href="img/Logo.png" type="image/png">

  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<header class="main-header">

  <div class="logo-container">
    <img src="img/Logo.png" alt="Logo MYMUSICK" loading="lazy">
    <h1 class="title">MYMUSICK</h1>
  </div>

  <div class="search-container">
    <input
      id="searchInput"
      class="search"
      type="search"
      placeholder="Busca tu música 🎵"
      aria-label="Buscar canciones"
      autocomplete="off"
      spellcheck="false">
  </div>

  <button
    class="bttlg"
    id="openLogin"
    type="button"
    aria-label="Iniciar sesión">
    Iniciar Sesión
  </button>

</header>

<aside class="sidebar" aria-label="Menú de navegación">

  <nav class="iconsdbar">

    <a href="#inicio" class="active">
      <span class="icon">🏠</span>
      <span>Inicio</span>
    </a>

    <a href="#seguido">
      <span class="icon">👥</span>
      <span>Seguidos</span>
    </a>

    <a href="#megusta">
      <span class="icon">❤️</span>
      <span>Me gusta</span>
    </a>

    <a href="#descargas">
      <span class="icon">💾</span>
      <span>Descargas</span>
    </a>

  </nav>

</aside>

<main class="main-content">

  <section class="welcome">

    <p class="intxt">
      ¿Qué vas a escuchar hoy?
    </p>

  </section>

  <section
    id="results"
    class="results"
    role="list"
    aria-live="polite"
    aria-label="Resultados de búsqueda">

  </section>

</main>

<footer class="player" aria-label="Reproductor de música">

  <img
    id="playerThumb"
    class="player-thumb"
    src=""
    alt="Portada de la canción"
    loading="lazy">

  <div class="player-text">

    <span id="nowPlaying">
      Selecciona una canción
    </span>

    <span
      id="playerArtist"
      class="player-sub">
    </span>

  </div>

  <button
    id="playPauseBtn"
    class="btn-play-pause"
    type="button"
    aria-label="Reproducir o pausar">
    ▶
  </button>

  <div class="volume-wrap">

    <span class="volume-icon">
      🔊
    </span>

    <input
      id="volumeSlider"
      type="range"
      min="0"
      max="1"
      step="0.05"
      value="0.8"
      aria-label="Control de volumen">

  </div>

</footer>

<canvas id="canvas" class="hidden" aria-hidden="true"></canvas>

<dialog id="loginModal">

  <form method="dialog" class="login-form">

    <button
      type="button"
      class="btn-close-dialog"
      id="closeLogin"
      aria-label="Cerrar ventana">
      ✕
    </button>

    <h3>Acceder</h3>

    <p>Inicia sesión para guardar tu música</p>

    <input
      type="text"
      placeholder="Usuario"
      required
      autocomplete="username">

    <input
      type="password"
      placeholder="Contraseña"
      required
      autocomplete="current-password">

    <button
      type="submit"
      class="btn-submit">
      Entrar
    </button>

  </form>

</dialog>

<script src="app.js"></script>

</body>
</html>
