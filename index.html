<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MYMUSICK - Busca y escucha tu música favorita.">
    <title>MYMUSICK</title>
    <link rel="icon" href="img/Logo.png" type="image/png">
    <link rel="stylesheet" href="estilo.css">

    <style>
        .hidden {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        dialog {
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>

<body>

<header>
    <div class="lgimg">
        <img src="img/Logo.png" alt="Logo MYMUSICK" width="50" height="50">
        <h1 class="title">MYMUSICK</h1>
    </div>

    <div class="ctsearch">
        <input id="searchInput" class="search" type="search"
            placeholder="Busca tu Música 🎵"
            aria-label="Buscar canciones">
    </div>

    <button class="bttlg"
        onclick="document.getElementById('loginModal').showModal()">
        Iniciar Sesión
    </button>
</header>

<aside class="sidebar">
    <nav>
        <div class="iconsdbar">
            <a href="#inicio">🏠</a>
            <a href="#seguido">👥</a>
            <a href="#megusta">❤️</a>
            <a href="#Descargados">💾</a>
        </div>
    </nav>
</aside>

<main>
    <p class="intxt">¿Qué vas a escuchar hoy?</p>
    <div id="results"></div>
</main>

<footer class="player">
    <span id="nowPlaying">Selecciona una canción</span>
    <button id="playPauseBtn" style="display:none;">⏸️ Pausar</button>
    <div id="yt-player" class="hidden"></div>
</footer>

<dialog id="loginModal">
    <form method="dialog" class="login-form">
        <h3>Bienvenido</h3>
        <input type="text" placeholder="Usuario" required>
        <input type="password" placeholder="Contraseña" required>
        <button type="submit" class="bttlg" style="width:100%;">Entrar</button>
    </form>
</dialog>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const input = document.getElementById("searchInput");
const results = document.getElementById("results");
const playPauseBtn = document.getElementById("playPauseBtn");
const nowPlayingText = document.getElementById("nowPlaying");

let player;

// API global obligatoria
window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("yt-player", {
        height: "0",
        width: "0",
        playerVars: {
            autoplay: 1
        },
        events: {
            onStateChange: onPlayerStateChange
        }
    });
};

// Buscar canciones
input.addEventListener("keydown", async (e) => {
    if (e.key !== "Enter") return;

    const query = input.value.trim();
    if (!query) return;

    results.innerHTML = `<p>Buscando... 🎵</p>`;

    try {
        const res = await fetch(`https://mymusick-backend.onrender.com/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error("Error");

        const songs = await res.json();
        renderSongs(songs);

    } catch {
        results.innerHTML = `<p>Error al buscar 😕</p>`;
    }
});

function renderSongs(songs) {
    results.innerHTML = "";

    if (!songs?.length) {
        results.innerHTML = `<p>No se encontraron resultados</p>`;
        return;
    }

    songs.forEach(song => {

        const div = document.createElement("div");
        div.className = "song";
        div.tabIndex = 0;

        const img = document.createElement("img");
        img.src = song.thumbnail;
        img.width = 120;
        img.loading = "lazy";

        const info = document.createElement("div");
        info.className = "song-info";

        const title = document.createElement("strong");
        title.textContent = song.title;

        const artist = document.createElement("small");
        artist.textContent = song.artist;

        info.appendChild(title);
        info.appendChild(artist);

        div.appendChild(img);
        div.appendChild(info);

        div.addEventListener("click", () => loadSong(song));
        div.addEventListener("keydown", e => {
            if (e.key === "Enter") loadSong(song);
        });

        results.appendChild(div);
    });
}

function loadSong(song) {
    if (!player) return;

    player.loadVideoById({
        videoId: song.id,
        startSeconds: 0
    });

    playPauseBtn.style.display = "inline-block";
    playPauseBtn.textContent = "⏸️ Pausar";
    nowPlayingText.textContent = `${song.title} - ${song.artist}`;
}

function togglePlayPause() {
    if (!player) return;

    const state = player.getPlayerState();

    if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
        playPauseBtn.textContent = "▶️ Reproducir";
    } else {
        player.playVideo();
        playPauseBtn.textContent = "⏸️ Pausar";
    }
}

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        playPauseBtn.textContent = "▶️ Reproducir";
    }
}

playPauseBtn.addEventListener("click", togglePlayPause);
</script>

</body>
</html>
