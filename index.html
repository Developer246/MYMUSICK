<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MYMUSICK - Busca y escucha tu música favorita.">
<title>MYMUSICK</title>

<link rel="icon" href="img/Logo.png" type="image/png">
<link rel="stylesheet" href="estiloformal2.css">

<style>
.hidden {
  display: none !important;
}

dialog {
  padding: 20px;
  border-radius: 10px;
  border: none;
  max-width: 400px;
  width: 90%;
}

dialog::backdrop {
  background: rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<header>
  <div class="lgimg">
    <img src="img/Logo.png" alt="Logo MYMUSICK">
    <h1 class="title">MYMUSICK</h1>
  </div>

  <input id="searchInput"
         class="search"
         type="search"
         placeholder="Busca tu Música 🎵"
         aria-label="Buscar canciones">

  <button class="bttlg" id="openLogin">
    Iniciar Sesión
  </button>
</header>

<aside class="sidebar">
  <nav>
    <a href="#inicio">🏠 Inicio</a>
    <a href="#seguido">👥 Seguidos</a>
    <a href="#megusta">❤️ Me gusta</a>
    <a href="#descargas">💾 Descargas</a>
  </nav>
</aside>

<main>
  <p class="intxt">¿Qué vas a escuchar hoy?</p>
  <div id="results"></div>
</main>

<footer class="player">
  <span id="nowPlaying">Selecciona una canción</span>
  <button id="playPauseBtn" class="hidden">▶️ Reproducir</button>
  <div id="yt-player" class="hidden"></div>
</footer>

<canvas id="canvas" class="hidden"></canvas>

<dialog id="loginModal">
  <form method="dialog">
    <h3>Bienvenido</h3>
    <input type="text" placeholder="Usuario" required>
    <input type="password" placeholder="Contraseña" required>
    <button type="submit" class="bttlg" style="width:100%;">Entrar</button>
  </form>
</dialog>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const input = document.getElementById("searchInput");
const results = document.getElementById("results");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const playPauseBtn = document.getElementById("playPauseBtn");
const nowPlayingText = document.getElementById("nowPlaying");
const loginModal = document.getElementById("loginModal");

document.getElementById("openLogin").onclick = () => loginModal.showModal();

let player;
let isPlaying = false;

/* =============================
   YOUTUBE API
============================= */
window.onYouTubeIframeAPIReady = function () {
  player = new YT.Player("yt-player", {
    height: "0",
    width: "0",
    playerVars: { autoplay: 0 },
    events: { onStateChange: onPlayerStateChange }
  });
};

/* =============================
   BUSCADOR
============================= */
input.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;

  const query = input.value.trim();
  if (!query) return;

  results.innerHTML = `<p>Buscando... 🎵</p>`;

  try {
    const res = await fetch(
      `https://mymusick-backend.onrender.com/search?q=${encodeURIComponent(query)}`
    );

    if (!res.ok) throw new Error();

    const songs = await res.json();
    renderSongs(songs);

  } catch {
    results.innerHTML = `<p>Error al buscar 😕</p>`;
  }
});

/* =============================
   RENDERIZAR RESULTADOS
============================= */
function renderSongs(songs) {
  results.innerHTML = "";

  if (!songs?.length) {
    results.innerHTML = `<p>No se encontraron resultados</p>`;
    return;
  }

  songs.forEach(song => {
    const div = document.createElement("div");
    div.className = "song";
    div.tabIndex = 0;

    div.innerHTML = `
      <img src="${song.thumbnail}" 
           alt="Portada de ${song.title}"
           loading="lazy"
           crossorigin="anonymous">
      <div class="song-info">
        <strong>${song.title}</strong>
        <small>${song.artist}</small>
      </div>
    `;

    div.addEventListener("mouseenter", () => detectarColor(song.thumbnail, div));
    div.addEventListener("mouseleave", () => div.style.background = "");
    div.addEventListener("click", () => loadSong(song));
    div.addEventListener("keydown", e => {
      if (e.key === "Enter") loadSong(song);
    });

    results.appendChild(div);
  });
}

/* =============================
   COLOR DOMINANTE
============================= */
function detectarColor(imgURL, element) {
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = imgURL;

  img.onload = () => {
    canvas.width = img.width / 4;
    canvas.height = img.height / 4;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const colors = {};
    let max = 0;
    let dominant = "0,0,0";

    for (let i = 0; i < data.length; i += 16) {
      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      if (r+g+b < 60 || r+g+b > 720) continue;

      const rgb = `${r},${g},${b}`;
      colors[rgb] = (colors[rgb] || 0) + 1;

      if (colors[rgb] > max) {
        max = colors[rgb];
        dominant = rgb;
      }
    }

    element.style.background = `rgba(${dominant}, 0.35)`;
  };
}

/* =============================
   REPRODUCTOR
============================= */
function loadSong(song) {
  if (!player) return;

  nowPlayingText.textContent = `${song.title} - ${song.artist}`;

  player.loadVideoById(song.id);
  player.playVideo();
}

function togglePlayPause() {
  if (!player) return;

  isPlaying ? player.pauseVideo() : player.playVideo();
}

function onPlayerStateChange(event) {
  isPlaying = event.data === YT.PlayerState.PLAYING;
  playPauseBtn.classList.remove("hidden");
  playPauseBtn.textContent = isPlaying ? "⏸️ Pausar" : "▶️ Reproducir";
}

playPauseBtn.onclick = togglePlayPause;
</script>

</body>
</html>
