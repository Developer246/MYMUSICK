<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MYMUSICK - Busca y escucha tu música favorita.">

<title>MYMUSICK</title>

<link rel="icon" href="img/Logo.png">
<link rel="stylesheet" href="style/estilooriginal.css">

</head>

<body>

<header class="header">

<div class="header-left">
<img src="img/Logo.png" class="logo">
<h1 class="title">MYMUSICK</h1>
</div>

<div class="header-center">

<input
id="searchInput"
class="search"
type="search"
placeholder="Busca tu música 🎵"
autocomplete="off">

</div>

</header>


<main class="main-content">

<p class="intxt">¿Qué vas a escuchar hoy?</p>

<section id="results" class="results"></section>

</main>


<footer id="player" style="display:none">

<img id="playerThumb" class="player-thumb">

<div class="player-text">

<span id="nowPlaying">Selecciona una canción</span>
<span id="playerArtist"></span>

</div>

<div class="player-progress">

<span id="currentTime">0:00</span>

<input
id="progressBar"
type="range"
min="0"
max="1"
step="0.001"
value="0">

<span id="duration">0:00</span>

</div>

<button id="playPauseBtn">▶</button>

<div class="volume-wrap">

<span>🔊</span>

<input
id="volumeSlider"
type="range"
min="0"
max="1"
step="0.05"
value="0.8">

</div>

</footer>

<canvas id="canvas" class="hidden"></canvas>

<script src="app.js"></script>

</body>
</html>
