name: Deploy MYMUSICK

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar URL del backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          python3 -c "
          import os
          url = os.environ['BACKEND_URL']
          with open('app.js', 'r') as f:
              content = f.read()
          content = content.replace('%%BACKEND_URL%%', url)
          with open('app.js', 'w') as f:
              f.write(content)
          print('URL inyectada:', url)
          "
          grep "BACKEND" app.js | head -1

      - name: Verificar reemplazo
        run: |
          if grep -q "%%BACKEND_URL%%" app.js; then
            echo "ERROR: El placeholder no fue reemplazado"
            exit 1
          else
            echo "OK: URL inyectada correctamente"
          fi

      - name: Copiar fuentes al directorio de deploy
        run: |
          ls -la fonts/ || echo "No hay carpeta fonts"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github'
          keep_files: false
