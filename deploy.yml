name: Deploy MYMUSICK

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar URL del backend
        run: |
          sed -i 's|%%BACKEND_URL%%|${{ secrets.BACKEND_URL }}|g' index.html

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
